<h1 class="title topictitle1">Scratch Memory Address to Collect Profile Data</h1>

<div class="body conbody">
<p class="p">This parameter indicates where in memory the profile data must be stored.
This memory must lie outside the program memory area (including the text,
data, heap, and stack), and should not be overwritten.</p>
