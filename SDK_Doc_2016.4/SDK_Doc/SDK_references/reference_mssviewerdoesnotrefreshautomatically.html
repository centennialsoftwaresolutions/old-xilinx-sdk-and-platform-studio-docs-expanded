    <h1 class="title topictitle1" id="mssviewerdoesnotrefreshautomatically__cj332430">MSS Viewer does not refresh automatically</h1>


    
    <div class="body refbody"><p class="shortdesc"></p>

        <section class="section"><h2 class="title sectiontitle">Issue</h2>
            
            <p class="p">The MSS viewer does not automatically refresh when either
                the MSS is changed via the BSP settings dialog box, or when the hardware
                specification is updated.</p>

        </section>

        <section class="section"><h2 class="title sectiontitle">Solution</h2>
            
            <p class="p">Close the MSS viewer and then double click on
                the MSS file to re-open it.</p>

        </section>

    </div>
