<h1 class="title topictitle1">How can I tell Xilinx System debugger to start at program entry?</h1>

<div class="body taskbody"><div class="section context">
<p class="p">If you wish to start debugging from program entry, check the <span class="ph uicontrol">Stop at program entry</span> checkbox in the <span class="ph uicontrol">Debug configuration</span> dialog box.</p>
