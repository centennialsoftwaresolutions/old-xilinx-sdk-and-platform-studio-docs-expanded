<h1 class="title topictitle1">MSS Viewer does not refresh automatically</h1>

<div class="body">
<ul class="ul">
<li class="li"><strong class="ph b">Issue</strong>: The MSS viewer does not automatically refresh when either
the MSS is changed via the BSP settings dialog box, or when the hardware
specification is updated.</li>

<li class="li"><strong class="ph b">Solution</strong>: Close the MSS viewer and then double click on
the MSS file to re-open it.</li>

</ul>
