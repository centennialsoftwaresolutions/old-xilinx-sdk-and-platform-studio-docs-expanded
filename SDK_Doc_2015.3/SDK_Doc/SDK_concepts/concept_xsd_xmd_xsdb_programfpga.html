<h1 class="title topictitle1">Program FPGA</h1>

<div class="body conbody">
<p class="p">In XSDB, the <strong class="ph b">fpga</strong> command can be used to program a FPGA. However,
unlike XMD, when using XSDB you must use the <strong class="ph b">targets</strong> command
to select the FPGA device before running the <strong class="ph b">fpga</strong> command.</p>
