<h1 class="title topictitle1">Output File</h1>

<div class="body taskbody"><div class="section context">
<p class="p">The output file and path name are specified in the Output Path field.
This identifies where the output binary image is generated.</p>

<br></br><img class="image" src="../images/sdk_t_create_zynq_boot_image-6.png" height="19" width="429"></img><br></br><p class="p">Two output formats are supported: *.bin
and *.mcs . The final boot image format is set based on the extension
specified in the output path.</p>
