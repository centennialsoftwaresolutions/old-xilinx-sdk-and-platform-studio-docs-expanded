<h1 class="title topictitle1">Project Conversion</h1>

<div class="body conbody">
<p class="p">You can convert projects from C to C++ (or from C++ to C). If, for example,
your requirements change and you must convert an existing C project to
C++, you can do this without recreating the project. The CDT converts
your project files and resolves any source control issues.</p>
