<h1 class="title topictitle1">Ctrl+C</h1>

<div class="body conbody">
<p class="p">With XMD, <strong class="ph b">Ctrl+C</strong> terminates the application immediately. </p>

<p class="p">In XSDB, you can use <strong class="ph b">Ctrl+C</strong> to terminate long running commands
like program FPGA or download a file. Press <strong class="ph b">Ctrl+C</strong> twice in
succession to terminate XSDB.</p>
